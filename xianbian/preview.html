<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Steve Jobs Particle Morph - User Images</title>
  <style>
    :root {
      --bg: #05070c;
      --panel: rgba(11, 18, 32, 0.72);
      --panel-line: rgba(151, 199, 255, 0.18);
      --text: rgba(244, 248, 255, 0.92);
      --muted: rgba(200, 215, 235, 0.68);
      --accent: #7dd3fc;
      --accent-2: #a78bfa;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 18% 12%, rgba(59, 130, 246, 0.26), transparent 28%),
        radial-gradient(circle at 82% 28%, rgba(167, 139, 250, 0.18), transparent 26%),
        linear-gradient(180deg, #02040a 0%, #07111f 58%, #020409 100%);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      isolation: isolate;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .scanline {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.035) 0px,
          rgba(255, 255, 255, 0.035) 1px,
          transparent 1px,
          transparent 5px
        );
      mix-blend-mode: screen;
      opacity: .25;
    }

    .hud {
      position: absolute;
      z-index: 5;
      top: 22px;
      left: 22px;
      width: min(410px, calc(100vw - 44px));
      padding: 18px 18px 16px;
      border: 1px solid var(--panel-line);
      background: var(--panel);
      backdrop-filter: blur(18px) saturate(130%);
      border-radius: 24px;
      box-shadow: 0 28px 80px rgba(0, 0, 0, .34);
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 8px;
      font-size: 12px;
      color: var(--accent);
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 18px var(--accent);
      animation: pulse 1.2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(.7); opacity: .55; }
      50% { transform: scale(1.28); opacity: 1; }
    }

    h1 {
      margin: 0;
      font-size: clamp(25px, 5vw, 48px);
      line-height: .98;
      letter-spacing: -0.055em;
      font-weight: 790;
    }

    .desc {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .current {
      margin-top: 13px;
      padding: 10px 12px;
      border: 1px solid rgba(125, 211, 252, .16);
      border-radius: 16px;
      background: rgba(4, 9, 18, .52);
      color: rgba(234, 246, 255, .86);
      font-size: 13px;
      line-height: 1.45;
    }

    .controls {
      display: grid;
      gap: 12px;
      margin-top: 15px;
    }

    .row {
      display: grid;
      gap: 7px;
    }

    label {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      color: rgba(232, 241, 255, .86);
      font-size: 12px;
      letter-spacing: .01em;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 2px;
    }

    button {
      border: 1px solid rgba(125, 211, 252, .22);
      background: rgba(14, 24, 44, .72);
      color: rgba(244, 248, 255, .94);
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 12px;
      cursor: pointer;
      transition: transform .2s ease, border-color .2s ease, background .2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(125, 211, 252, .52);
      background: rgba(22, 41, 71, .82);
    }

    .credits {
      position: absolute;
      z-index: 5;
      right: 18px;
      bottom: 14px;
      width: min(560px, calc(100vw - 36px));
      padding: 12px 14px;
      border: 1px solid rgba(151, 199, 255, .14);
      border-radius: 18px;
      background: rgba(5, 9, 17, .62);
      backdrop-filter: blur(14px);
      color: rgba(219, 233, 255, .70);
      font-size: 11px;
      line-height: 1.55;
    }

    .credits a { color: rgba(157, 220, 255, .88); text-decoration: none; }
    .credits a:hover { text-decoration: underline; }

    .thumbs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .thumb {
      width: 48px;
      height: 34px;
      object-fit: cover;
      border-radius: 9px;
      opacity: .68;
      border: 1px solid rgba(255,255,255,.13);
      cursor: pointer;
      transition: opacity .2s ease, transform .2s ease, border-color .2s ease;
    }

    .thumb.active {
      opacity: 1;
      transform: translateY(-1px);
      border-color: rgba(125,211,252,.72);
      box-shadow: 0 0 24px rgba(125,211,252,.18);
    }

    .loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 4;
      color: rgba(244, 248, 255, .72);
      font-size: 13px;
      letter-spacing: .05em;
      pointer-events: none;
      transition: opacity .45s ease;
    }

    .loading.hide { opacity: 0; }

    @media (max-width: 720px) {
      .hud { top: 12px; left: 12px; width: calc(100vw - 24px); padding: 15px; border-radius: 20px; }
      .credits { display: none; }
      .desc { font-size: 13px; }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Steve Jobs digital particle morph visual">
    <canvas id="visual"></canvas>
    <div class="scanline"></div>
    <div class="loading" id="loading">loading user image particles...</div>

    <section class="hud">
      <p class="eyebrow"><span class="pulse"></span> HTML / Canvas / Particle Morph</p>
      <h1>Steve Jobs<br/>点线数字流变</h1>
      <p class="desc">使用你提供的 Steve Jobs 图像链接构建粒子坐标；粒子按距离连线，并通过插值在不同形象之间流变切换。</p>
      <div class="current" id="currentInfo">正在初始化...</div>

      <div class="thumbs" id="thumbs" aria-label="选择参考图片"></div>

      <div class="controls">
        <div class="row">
          <label for="speedRange"><span>切换流变速度 transitionSeconds</span><strong id="speedText">4.8s</strong></label>
          <input id="speedRange" type="range" min="1.2" max="12" step="0.1" value="4.8" />
        </div>
        <div class="row">
          <label for="densityRange"><span>粒子数量 particleCount</span><strong id="densityText">1800</strong></label>
          <input id="densityRange" type="range" min="700" max="3400" step="100" value="1800" />
        </div>
        <div class="row">
          <label for="lineRange"><span>连线距离 lineDistance</span><strong id="lineText">42px</strong></label>
          <input id="lineRange" type="range" min="16" max="78" step="1" value="42" />
        </div>
        <div class="buttons">
          <button id="prevBtn" type="button">上一张</button>
          <button id="nextBtn" type="button">下一张</button>
          <button id="pauseBtn" type="button">暂停</button>
        </div>
      </div>
    </section>

    <aside class="credits" id="credits">
      图片来源与授权见底部 attribution。前两张图已内嵌，避免 Canvas 跨域失败；HiClipart/CNBC 链接保留为参考，若远程图片因热链或 CORS 限制无法被读取，程序会自动降级为可流变的轮廓粒子形象。
    </aside>
  </main>

      const pa = useWhitePoints ? .62 + Math.min(.34, c.score / 260) : .42 + Math.min(.58, c.score / 220);
      pts.push({
        x: ox + (c.x + jitter) * scale,
        y: oy + (c.y + jitter) * scale,
        tx: ox + c.x * scale,
        ty: oy + c.y * scale,
        r: pr,
        g: pg,
        b: pb,
        a: pa,
        seed: Math.random() * Math.PI * 2
      });
    }
    return pts;
  }

  function lum(r, g, b) { return 0.2126 * r + 0.7152 * g + 0.0722 * b; }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  }

  function fallbackTarget(name, count) {
    const pts = [];
    const cx = W * .53;
    const cy = H * .54;
    const s = Math.min(W, H);

    function pushEllipse(n, ex, ey, rx, ry, weight = 1, color = [125, 211, 252], alpha = .76) {
      for (let k = 0; k < n; k++) {
        const t = Math.random() * Math.PI * 2;
        const u = Math.sqrt(Math.random());
        pts.push({
          x: ex + Math.cos(t) * rx * u,
          y: ey + Math.sin(t) * ry * u,
          r: color[0], g: color[1], b: color[2],
          a: alpha * weight,
          seed: Math.random() * 10
        });
      }
    }

    if (name.includes("HiClipart")) {
      // 远程图像若因防盗链或 CORS 无法读取，生成一个黑白肖像式粒子轮廓作为降级目标。
      pushEllipse(Math.floor(count * .48), cx, cy - s * .08, s * .155, s * .205, 1, [230, 238, 248], .80); // face
      pushEllipse(Math.floor(count * .18), cx - s * .085, cy - s * .11, s * .032, s * .020, 1, [120, 210, 250], .88); // left eye/glass
      pushEllipse(Math.floor(count * .18), cx + s * .085, cy - s * .11, s * .032, s * .020, 1, [120, 210, 250], .88); // right eye/glass
      pushEllipse(Math.floor(count * .24), cx, cy + s * .09, s * .105, s * .07, 1, [210, 220, 230], .68); // beard
      pushEllipse(Math.floor(count * .22), cx - s * .015, cy + s * .24, s * .20, s * .135, 1, [55, 75, 100], .55); // torso
      while (pts.length < count) pushEllipse(1, cx, cy, s * .20, s * .28, 1, [160, 210, 250], .55);
      pts.length = count;
      return pts;
    }

    if (name.includes("CNBC")) {
      // CNBC 链接是参考页，不是直接图片；这里转成“舞台光束/排行榜 No.1”式抽象形象。
      for (let i = 0; i < count; i++) {
        const t = i / count;
        const angle = t * Math.PI * 2 * 2.5;
        const radius = s * (.06 + .22 * t);
        pts.push({
          x: cx + Math.cos(angle) * radius + Math.sin(t * 30) * 8,
          y: cy + Math.sin(angle) * radius * 1.18,
          r: 125 + Math.floor(80 * t), g: 211, b: 252,
          a: .52 + Math.random() * .32,
          seed: Math.random() * 10
        });
      }
      return pts;
    }

    const rx = s * .19;
    const ry = s * .26;
    for (let i = 0; i < count; i++) {
      const t = Math.random() * Math.PI * 2;
      const u = Math.sqrt(Math.random());
      let x = cx + Math.cos(t) * rx * u;
      let y = cy + Math.sin(t) * ry * u;
      pts.push({ x, y, r: 120, g: 210, b: 252, a: .76, seed: Math.random() * 10 });
    }
    return pts;
  }

  async function loadImage(meta) {
    return new Promise((resolve) => {
      const img = new Image();
      if (/^https?:\/\//.test(String(meta.url))) {
        img.crossOrigin = "anonymous";
        img.referrerPolicy = "no-referrer";
      }
      img.onload = () => resolve({ img, meta, ok: true });
      img.onerror = () => resolve({ img: null, meta, ok: false });
      img.src = meta.url;
    });
  }

  async function init() {
    speedText.textContent = config.transitionSeconds.toFixed(1) + "s";
    densityText.textContent = String(config.particleCount);
    lineText.textContent = config.lineDistance + "px";

    credits.innerHTML = `图片来源：${IMAGES.map((m, i) =>
      `<a href="${m.page}" target="_blank" rel="noreferrer">${i + 1}. ${m.name}</a> / ${m.author} / ${m.license} / ${m.embedded ? "已内嵌" : "外部链接或参考"}`
    ).join("；")}。视觉效果为前端实时粒子化与点线连结；切换速度由 transitionSeconds 参数控制。`;

    thumbs.innerHTML = "";
    thumbNodes = IMAGES.map((m, i) => {
      const im = document.createElement("img");
      im.src = m.url;
      im.alt = m.name;
      im.className = "thumb";
      im.title = m.name;
      im.onclick = () => goTo(i);
      thumbs.appendChild(im);
      return im;
    });

    loadedImages = await Promise.all(IMAGES.map(loadImage));
    rebuildTargets();
    buildParticles();
    updateInfo();
    loading.classList.add("hide");
    requestAnimationFrame(loop);
  }

  function rebuildTargets() {
    if (!loadedImages.length) return;
    targets = loadedImages.map((entry) => {
      if (entry.ok && entry.img) {
        return sampleTargetFromImage(entry.img, entry.meta, config.particleCount);
      }
      return fallbackTarget(entry.meta.name, config.particleCount);
    });
    if (particles.length) {
      for (let i = 0; i < config.particleCount; i++) {
        const p = particles[i] || makeParticle(i);
        const src = targets[activeIndex][i % targets[activeIndex].length];
        p.x = src.x; p.y = src.y;
        p.from = { ...src };
        p.to = { ...targets[nextIndex][i % targets[nextIndex].length] };
        particles[i] = p;
      }
      particles.length = config.particleCount;
    }
  }

  function makeParticle(i) {
    const base = targets[activeIndex]?.[i % (targets[activeIndex]?.length || 1)] || { x: W / 2, y: H / 2, r: 125, g: 211, b: 252, a: 1, seed: Math.random() * 10 };
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      from: { ...base },
      to: { ...base },
      vx: 0,
      vy: 0,
      seed: Math.random() * 999
    };
  }

  function buildParticles() {
    particles = [];
    for (let i = 0; i < config.particleCount; i++) {
      const a = targets[activeIndex][i % targets[activeIndex].length];
      const b = targets[nextIndex][i % targets[nextIndex].length];
      particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        from: { ...a },
        to: { ...b },
        seed: Math.random() * 1000
      });
    }
    transitionStart = performance.now();
    autoSwitchAt = transitionStart + (config.transitionSeconds + config.holdSeconds) * 1000;
    isTransitioning = activeIndex !== nextIndex;
  }

  function startTransition(toIndex) {
    if (!targets.length) return;
    activeIndex = ((activeIndex % targets.length) + targets.length) % targets.length;
    const targetIndex = ((toIndex % targets.length) + targets.length) % targets.length;
    if ((!isTransitioning && targetIndex === activeIndex) || (isTransitioning && targetIndex === nextIndex)) return;
    nextIndex = targetIndex;
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.from = snapshotParticle(p);
      p.to = { ...targets[nextIndex][i % targets[nextIndex].length] };
    }
    isTransitioning = true;
    transitionStart = performance.now();
    autoSwitchAt = transitionStart + (config.transitionSeconds + config.holdSeconds) * 1000;
    updateInfo();
  }

  function snapshotParticle(p) {
    return { x: p.x, y: p.y, r: p.r ?? p.to.r, g: p.g ?? p.to.g, b: p.b ?? p.to.b, a: p.a ?? p.to.a, seed: p.seed };
  }

  function completeTransition(now = performance.now()) {
    activeIndex = nextIndex;
    nextIndex = (activeIndex + 1) % targets.length;
    isTransitioning = false;
    for (let i = 0; i < particles.length; i++) {
      const src = targets[activeIndex][i % targets[activeIndex].length];
      particles[i].from = { ...src };
      particles[i].to = { ...src };
      particles[i].x = src.x;
      particles[i].y = src.y;
    }
    autoSwitchAt = now + config.holdSeconds * 1000;
    updateInfo();
  }

  function goTo(index) {
    if (!targets.length) return;
    if ((!isTransitioning && index === activeIndex) || (isTransitioning && index === nextIndex)) return;
    startTransition(index);
  }

  function updateInfo() {
    const displayIndex = isTransitioning ? nextIndex : activeIndex;
    const m = IMAGES[displayIndex] || IMAGES[activeIndex];
    currentInfo.innerHTML = `切换目标：<strong>${m.name}</strong><br>速度参数：<code>transitionSeconds = ${config.transitionSeconds.toFixed(1)}</code>；粒子：${config.particleCount}；连线阈值：${config.lineDistance}px`;
    thumbNodes.forEach((node, i) => node.classList.toggle("active", i === displayIndex));
  }

  function drawBackground(now) {
    ctx.fillStyle = `rgba(2, 4, 10, ${config.backgroundFade})`;
    ctx.fillRect(0, 0, W, H);

    const gx = W * (0.5 + Math.sin(now * 0.00008) * 0.06);
    const gy = H * (0.46 + Math.cos(now * 0.00007) * 0.05);
    const grad = ctx.createRadialGradient(gx, gy, 20, gx, gy, Math.max(W, H) * 0.72);
    grad.addColorStop(0, "rgba(45, 130, 220, 0.14)");
    grad.addColorStop(.36, "rgba(33, 60, 115, 0.09)");
    grad.addColorStop(1, "rgba(0, 0, 0, 0)");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  function loop(now) {
    const dt = Math.min(0.032, (now - lastNow) / 1000);
    lastNow = now;
    if (!paused) draw(now, dt);
    requestAnimationFrame(loop);
  }

  function draw(now, dt) {
    drawBackground(now);

    const dur = Math.max(1, config.transitionSeconds * 1000);
    let rawT = isTransitioning ? Math.min(1, (now - transitionStart) / dur) : 1;
    let t = isTransitioning ? easeInOutCubic(rawT) : 1;

    updateParticles(now, t, dt);
    drawLines();
    drawPoints(now, t);

    if (isTransitioning && rawT >= 1) {
      completeTransition(now);
    }
    if (!isTransitioning && now > autoSwitchAt) {
      startTransition(nextIndex);
    }
  }

  function updateParticles(now, t, dt) {
    const waveTime = now * 0.001;
    for (const p of particles) {
      const tw = Math.sin(waveTime + p.seed) * config.shimmer;
      const x = lerp(p.from.x, p.to.x, t) + Math.cos(waveTime * .9 + p.seed) * tw;
      const y = lerp(p.from.y, p.to.y, t) + Math.sin(waveTime * 1.1 + p.seed) * tw;
      p.x += (x - p.x) * Math.min(1, dt * 12);
      p.y += (y - p.y) * Math.min(1, dt * 12);
      p.r = Math.round(lerp(p.from.r || 120, p.to.r || 120, t));
      p.g = Math.round(lerp(p.from.g || 210, p.to.g || 210, t));
      p.b = Math.round(lerp(p.from.b || 252, p.to.b || 252, t));
      p.a = lerp(p.from.a || .6, p.to.a || .8, t);
    }
  }

  function drawPoints(now, t) {
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      const pulse = 0.7 + Math.sin(now * 0.004 + p.seed) * 0.18;
      const radius = config.pointRadius * pulse * (0.86 + p.a * .5);
      ctx.beginPath();
      ctx.fillStyle = `rgba(${p.r}, ${p.g}, ${p.b}, ${Math.min(.92, p.a)})`;
      ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawLines() {
    const maxDist = config.lineDistance;
    const maxDist2 = maxDist * maxDist;
    const cell = maxDist;
    const grid = new Map();

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      const gx = Math.floor(p.x / cell);
      const gy = Math.floor(p.y / cell);
      const key = gx + "," + gy;
      if (!grid.has(key)) grid.set(key, []);
      grid.get(key).push(i);
    }

    ctx.save();
    ctx.globalCompositeOperation = "screen";
    ctx.lineWidth = 0.62;
    let drawn = 0;
    const lineBudget = Math.min(4600, particles.length * 2.5);

    for (let i = 0; i < particles.length && drawn < lineBudget; i += 1) {
      const p = particles[i];
      const gx = Math.floor(p.x / cell);
      const gy = Math.floor(p.y / cell);
      let local = 0;

      for (let oy = -1; oy <= 1; oy++) {
        for (let ox = -1; ox <= 1; ox++) {
          const arr = grid.get((gx + ox) + "," + (gy + oy));
          if (!arr) continue;
          for (const j of arr) {
            if (j <= i) continue;
            const q = particles[j];
            const dx = p.x - q.x;
            const dy = p.y - q.y;
            const d2 = dx * dx + dy * dy;
            if (d2 < maxDist2) {
              const strength = 1 - d2 / maxDist2;
              ctx.strokeStyle = `rgba(${Math.floor((p.r + q.r) / 2)}, ${Math.floor((p.g + q.g) / 2)}, ${Math.floor((p.b + q.b) / 2)}, ${0.06 + strength * 0.19})`;
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(q.x, q.y);
              ctx.stroke();
              drawn++;
              local++;
              if (local > 4 || drawn >= lineBudget) break;
            }
          }
          if (local > 4 || drawn >= lineBudget) break;
        }
        if (local > 4 || drawn >= lineBudget) break;
      }
    }
    ctx.restore();
  }

  speedRange.addEventListener("input", () => {
    config.transitionSeconds = Number(speedRange.value);
    speedText.textContent = config.transitionSeconds.toFixed(1) + "s";
    updateInfo();
  });

  densityRange.addEventListener("change", () => {
    config.particleCount = Number(densityRange.value);
    densityText.textContent = String(config.particleCount);
    rebuildTargets();
    buildParticles();
    updateInfo();
  });

  densityRange.addEventListener("input", () => {
    densityText.textContent = densityRange.value;
  });

  lineRange.addEventListener("input", () => {
    config.lineDistance = Number(lineRange.value);
    lineText.textContent = config.lineDistance + "px";
    updateInfo();
  });

  prevBtn.addEventListener("click", () => startTransition((activeIndex - 1 + targets.length) % targets.length));
  nextBtn.addEventListener("click", () => startTransition((activeIndex + 1) % targets.length));
  pauseBtn.addEventListener("click", () => {
    paused = !paused;
    pauseBtn.textContent = paused ? "继续" : "暂停";
    if (!paused) {
      const now = performance.now();
      lastNow = now;
      if (isTransitioning) {
        for (const p of particles) p.from = snapshotParticle(p);
        transitionStart = now;
        autoSwitchAt = now + (config.transitionSeconds + config.holdSeconds) * 1000;
      } else {
        autoSwitchAt = now + config.holdSeconds * 1000;
      }
    }
  });

  window.addEventListener("resize", () => {
    clearTimeout(window.__jobsMorphResize);
    window.__jobsMorphResize = setTimeout(resize, 120);
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") startTransition((activeIndex + 1) % targets.length);
    if (e.key === "ArrowLeft") startTransition((activeIndex - 1 + targets.length) % targets.length);
    if (e.key === " ") { e.preventDefault(); pauseBtn.click(); }
  });

  resize();
  init();
})();
</script>
</body>
</html>
