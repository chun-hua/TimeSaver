<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steve Jobs · 粒子叙事</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0c; }
  body {
    /* 系统中文字体优先；Google Fonts 作为增强（需 HTTP 服务） */
    font-family:
      'Songti SC', 'STSongti', 'Noto Serif CJK SC', 'Source Han Serif SC',
      'SimSun', 'NSimSun', 'FangSong', 'STFangsong',
      'Noto Serif SC', serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none;
  }

  .stage-container {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 2; pointer-events: none;
  }

  /* ── 上部：主金句 ── */
  .quote-block {
    position: absolute; top: 5vh; left: 50%; transform: translateX(-50%);
    text-align: center; max-width: 85vw;
    opacity: 0; transition: opacity 1.2s ease, transform 1s ease;
    transform: translateX(-50%) translateY(12px);
  }
  .quote-block.active { opacity: 1; transform: translateX(-50%) translateY(0); }

  .quote-chinese {
    font-family: 'Songti SC', 'STSongti', 'Noto Serif CJK SC', 'Source Han Serif SC', 'SimSun', serif;
    font-weight: 600; font-size: clamp(1.3rem, 3.2vw, 2.2rem);
    color: #f0ebe0; letter-spacing: 0.06em; line-height: 1.55;
    text-shadow: 0 0 60px rgba(240,235,224,0.18);
    margin-bottom: 0.35em;
  }

  .quote-english {
    font-family: 'Songti SC', 'STSongti', 'Noto Serif CJK SC', 'Source Han Serif SC', 'SimSun', serif;
    font-weight: 300; font-size: clamp(0.75rem, 1.6vw, 1.05rem);
    color: rgba(210,200,180,0.65); font-style: italic; letter-spacing: 0.03em;
    margin-bottom: 0.6em;
  }

  .quote-context {
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 300; font-size: clamp(0.6rem, 1.15vw, 0.78rem);
    color: rgba(180,170,155,0.45); letter-spacing: 0.08em;
  }

  /* ── 下部：阶段指示器 ── */
  .stage-indicator {
    position: absolute; bottom: 6vh; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; align-items: center;
    opacity: 0; transition: opacity 1s ease;
  }
  .stage-indicator.visible { opacity: 1; }

  .stage-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(180,170,155,0.25); transition: all 0.7s ease;
  }
  .stage-dot.current {
    background: rgba(240,225,195,0.85);
    box-shadow: 0 0 12px rgba(240,225,195,0.5), 0 0 24px rgba(240,225,195,0.2);
    width: 10px; height: 10px;
  }
  .stage-dot.past { background: rgba(180,170,155,0.12); }

  .stage-name {
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 300; font-size: clamp(0.55rem, 1.1vw, 0.72rem);
    color: rgba(180,170,155,0.55); letter-spacing: 0.1em;
    margin-left: 6px;
    transition: color 0.7s ease;
  }
  .stage-name.active { color: rgba(240,225,195,0.75); }

  /* ── 画布 ── */
  canvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 1;
  }

  /* 点击提示 */
  .hint {
    position: absolute; bottom: 14vh; left: 50%; transform: translateX(-50%);
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 300; font-size: 0.65rem; color: rgba(150,140,130,0.3);
    letter-spacing: 0.08em; z-index: 3; pointer-events: none;
    opacity: 0; transition: opacity 0.8s ease;
  }
  .hint.show { opacity: 1; }
</style>
</head>

<div class="hint show" id="hint">点击任意位置 或 等待自动演进</div>

// ── Canvas 尺寸 ──
let W, H, S, CX, CY;
function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);

  H = window.innerHeight * dpr;
  canvas.width = W;
  canvas.height = H;
  S = Math.min(W, H) * 0.62;  // particle square size

  CY = H / 2;
}
resize();
window.addEventListener('resize', resize);

// ── 粒子定义 ──
const N = 460;

// Shape primitive helper

  return { type, ...config };
}

      p('arc', { x: 0.5, y: 0.55, rx: 0.30, ry: 0.20, a0: 0.0, a1: 3.1, t: 0.05, n: 130, c: tint, a: 0.6 }),
      // Inner wings

// ══════════════════════════════════════════════
//  采样引擎
// ══════════════════════════════════════════════

function rand() { return Math.random(); }
function randRange(a, b) { return a + rand() * (b - a); }

function sampleShape(shapes, totalN) {
  const totalPrim = shapes.reduce((s, p) => s + p.n, 0);
  if (totalPrim === 0) { console.warn('Empty shape'); return []; }

  const particles = [];
  for (const prim of shapes) {
    const count = Math.round(totalN * prim.n / totalPrim);
    const color = prim.c || [220, 220, 220];
    const alpha = prim.a || 0.7;

    switch (prim.type) {
      case 'e': {  // filled ellipse
        for (let i = 0; i < count; i++) {
          const r = Math.sqrt(rand());
          const angle = rand() * Math.PI * 2;
          particles.push({
            nx: prim.x + r * Math.cos(angle) * prim.rx,
            ny: prim.y + r * Math.sin(angle) * prim.ry,
            r: color[0], g: color[1], b: color[2], a: alpha,
          });
        }
        break;
      }
      case 'r': {  // ring
        for (let i = 0; i < count; i++) {
          const angle = rand() * Math.PI * 2;
          const halfT = prim.t / 2;
          const dist = 1.0 + randRange(-halfT, halfT);
          particles.push({
            nx: prim.x + dist * Math.cos(angle) * prim.rx,
            ny: prim.y + dist * Math.sin(angle) * prim.ry,
            r: color[0], g: color[1], b: color[2], a: alpha,
          });
        }
        break;
      }
      case 'l': {  // line
        for (let i = 0; i < count; i++) {
          const t = rand();
          const nx = prim.x1 + t * (prim.x2 - prim.x1) + randRange(-prim.w/2, prim.w/2);
          const ny = prim.y1 + t * (prim.y2 - prim.y1) + randRange(-prim.w/2, prim.w/2);
          particles.push({ nx, ny, r: color[0], g: color[1], b: color[2], a: alpha });
        }
        break;
      }
      case 'arc': {  // arc segment
        for (let i = 0; i < count; i++) {
          const angle = randRange(prim.a0, prim.a1);
          const halfT = prim.t / 2;
          const dist = 1.0 + randRange(-halfT, halfT);
          particles.push({
            nx: prim.x + dist * Math.cos(angle) * prim.rx,
            ny: prim.y + dist * Math.sin(angle) * prim.ry,
            r: color[0], g: color[1], b: color[2], a: alpha,
          });
        }
        break;
      }
      case 's': {  // scatter (rim-biased)
        for (let i = 0; i < count; i++) {
          const angle = rand() * Math.PI * 2;
          const r = 0.5 + 0.55 * rand();
          particles.push({
            nx: prim.x + r * Math.cos(angle) * prim.rx,
            ny: prim.y + r * Math.sin(angle) * prim.ry,
            r: color[0], g: color[1], b: color[2], a: alpha,
          });
        }
        break;
      }
    }
  }
  // Ensure exactly totalN particles
  while (particles.length > totalN) particles.pop();
  while (particles.length < totalN) {
    const i = Math.floor(rand() * particles.length);
    particles.push({ ...particles[i] });
  }
  return particles;
}

// ══════════════════════════════════════════════
//  粒子系统
// ══════════════════════════════════════════════

let curStage = 0;
let nextStage = 0;  // target
let morphStart = 0;
let particles = [];
let isMorphing = false;

const MORPH_MS = 2800;
const HOLD_MS = 3800;

function initParticles() {
  const shapes = buildShapes(STAGES[0].tint);
  const target = sampleShape(shapes[0], N);
  particles = target.map(t => ({
    nx: t.nx, ny: t.ny,
    tnx: t.nx, tny: t.ny,
    r: t.r, g: t.g, b: t.b, a: t.a,
    tr: t.r, tg: t.g, tb: t.b, ta: t.a,
    seed: rand() * Math.PI * 2,
  }));
}

function morphToStage(idx) {
  const shapes = buildShapes(STAGES[idx].tint);
  const target = sampleShape(shapes[idx], N);
  for (let i = 0; i < particles.length && i < target.length; i++) {
    const p = particles[i], t = target[i];
    p.tnx = t.nx; p.tny = t.ny;
    p.tr = t.r; p.tg = t.g; p.tb = t.b; p.ta = t.a;
    // Save source colors
    p.sr = p.r; p.sg = p.g; p.sb = p.b; p.sa = p.a;
  }
  nextStage = idx;
  morphStart = performance.now();
  isMorphing = true;
}

// ══════════════════════════════════════════════
//  渲染
// ══════════════════════════════════════════════

function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

function draw(now) {
  ctx.clearRect(0, 0, W, H);

  // Background glow
  const stage = STAGES[curStage];
  const tint = stage.tint.join(',');
  const pulse = 1 + Math.sin(now * 0.0004) * 0.05;
  const boxCX = CX;
  const boxCY = CY;
  const boxS = S * 0.85;
  const bgGrad = ctx.createRadialGradient(boxCX, boxCY, boxS * 0.08, boxCX, boxCY, boxS * 0.55);
  bgGrad.addColorStop(0, `rgba(${tint},${0.07 * pulse})`);
  bgGrad.addColorStop(0.5, `rgba(${tint},${0.02 * pulse})`);
  bgGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Update particle positions
  if (isMorphing) {
    const elapsed = now - morphStart;
    const rawT = Math.min(elapsed / MORPH_MS, 1.0);
    const t = ease(rawT);

    for (const p of particles) {
      p.nx = p.sx + (p.tnx - p.sx) * t;
      p.ny = p.sy + (p.tny - p.sy) * t;
      p.r = p.sr + (p.tr - p.sr) * t;
      p.g = p.sg + (p.tg - p.sg) * t;
      p.b = p.sb + (p.tb - p.sb) * t;
      p.a = p.sa + (p.ta - p.sa) * t;
    }

    if (rawT >= 1.0) {
      // Snap
      for (const p of particles) {
        p.nx = p.tnx; p.ny = p.tny;
        p.r = p.tr; p.g = p.tg; p.b = p.tb; p.a = p.ta;
      }
      curStage = nextStage;
      isMorphing = false;
      // Trigger quote transition
      updateUI(curStage);
    }
  }

  // Draw particles
  ctx.globalCompositeOperation = 'lighter';
  const box = Math.min(W, H) * 0.62;
  const bx = (W - box) / 2;
  const by = (H - box) / 2;

  for (const p of particles) {
    const px = bx + p.nx * box;
    const py = by + p.ny * box;
    const driftX = Math.sin(now * 0.0012 + p.seed) * 1.6;
    const driftY = Math.cos(now * 0.00085 + p.seed * 1.4) * 1.6;
    const x = px + driftX;
    const y = py + driftY;

    // Outer halo
    ctx.beginPath();
    ctx.arc(x, y, 5.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${Math.round(p.r)},${Math.round(p.g)},${Math.round(p.b)},${(p.a*0.05*pulse).toFixed(3)})`;
    ctx.fill();

    // Medium glow
    ctx.beginPath();
    ctx.arc(x, y, 2.8, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${Math.round(p.r)},${Math.round(p.g)},${Math.round(p.b)},${(p.a*0.16*pulse).toFixed(3)})`;
    ctx.fill();

    // Bright core
    ctx.beginPath();
    ctx.arc(x, y, 1.1, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${Math.round(Math.min(p.r*1.1,255))},${Math.round(Math.min(p.g*1.1,255))},${Math.round(Math.min(p.b*1.1,255))},${(p.a*0.88*pulse).toFixed(3)})`;
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';
}

// ══════════════════════════════════════════════
//  UI 更新
// ══════════════════════════════════════════════

const quoteBlock = document.getElementById('quoteBlock');
const stageIndicator = document.getElementById('stageIndicator');
const hint = document.getElementById('hint');

function buildStageDots() {
  let html = '';
  for (let i = 0; i < STAGES.length; i++) {
    if (i < curStage) html += '<span class="stage-dot past"></span>';
    else if (i === curStage) html += '<span class="stage-dot current"></span>';
    else html += '<span class="stage-dot"></span>';
  }
  html += `<span class="stage-name active">${STAGES[curStage].name}</span>`;
  stageIndicator.innerHTML = html;
}

let quoteTimeout = null;

function updateUI(idx) {
  // Hide current
  quoteBlock.classList.remove('active');

  if (quoteTimeout) clearTimeout(quoteTimeout);

  // Show new after brief pause
  quoteTimeout = setTimeout(() => {
    const s = STAGES[idx];
    quoteBlock.innerHTML = `
      <div class="quote-chinese">${s.chinese}</div>
      <div class="quote-english">${s.english}</div>
      <div class="quote-context">${s.context}</div>
    `;
    quoteBlock.classList.add('active');
    buildStageDots();
  }, 600);
}

function advanceStage() {
  const next = (curStage + 1) % STAGES.length;
  // Save current positions as source for morph
  for (const p of particles) {
    p.sx = p.nx; p.sy = p.ny;
    p.sr = p.r; p.sg = p.g; p.sb = p.b; p.sa = p.a;
  }
  morphToStage(next);
  // Hide hint after first click
  if (hint.classList.contains('show')) {
    hint.classList.remove('show');
  }
}

// Click to advance
function userAdvance() {
  if (isMorphing) return;
  lastAdvance = performance.now();
  advanceStage();
}
document.addEventListener('click', userAdvance);
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    userAdvance();
  }
});

// Touch
document.addEventListener('touchstart', e => {
  e.preventDefault();
  userAdvance();
});

// ══════════════════════════════════════════════
//  自动循环
// ══════════════════════════════════════════════

let lastAdvance = performance.now();
let autoAdvanceTimer = null;
const AUTO_ADVANCE_AFTER_CLICK = 28000;  // 28s after user click
const AUTO_ADVANCE_INITIAL = 6000;       // 6s initial

function scheduleAutoAdvance() {
  const now = performance.now();
  const elapsed = now - lastAdvance;
  const delay = hint.classList.contains('show') ? AUTO_ADVANCE_INITIAL : AUTO_ADVANCE_AFTER_CLICK;

  if (elapsed >= delay && !isMorphing) {
    advanceStage();
    lastAdvance = performance.now();
  }

  autoAdvanceTimer = requestAnimationFrame(() => {
    scheduleAutoAdvance();
  });
}

// ══════════════════════════════════════════════
//  主循环
// ══════════════════════════════════════════════

initParticles();
buildStageDots();
updateUI(0);
lastAdvance = performance.now();

function loop(now) {
  draw(now);
  requestAnimationFrame(loop);
}

scheduleAutoAdvance();
requestAnimationFrame(loop);
</script>
</body>
